name: Generate Comparisons

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run comparison generation script
        run: npx tsx scripts/generate-comparisons.ts

      - name: SEO guardrail
        run: npm run seo:audit

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/comparisons/
          git diff --cached --quiet || git commit -m "chore: weekly generate comparisons [$(date -u +%Y-%m-%d)]"
          git push
